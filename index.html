<!DOCTYPE html>
<html>

    </head>
    <body>
        <p>finding the largest  umberf with the help of arguements </p>
        <p id = "result"></p>
        <script>
            function findMax(){
                var i;
                var max = 0;
                for(i = 0; i < arguments.length; i++){
                    if(arguments[i] > max){
                        max = arguments[i];
                    }
                }
                return max;
            }
            document.getElementById("result").innerHTML = "the largest number is " + findMax(4, 5, 6);
            </script>
    </body>
</html>
